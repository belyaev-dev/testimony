services:
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  testimony:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/testimony-dev/testimony:local-compose
    depends_on:
      minio:
        condition: service_healthy
    environment:
      TESTIMONY_LOG_LEVEL: debug
      TESTIMONY_SERVER_HOST: 0.0.0.0
      TESTIMONY_SERVER_PORT: "8080"
      TESTIMONY_SQLITE_PATH: /var/lib/testimony/data/testimony.sqlite
      TESTIMONY_TEMP_DIR: /var/lib/testimony/tmp
      TESTIMONY_S3_ENDPOINT: http://minio:9000
      TESTIMONY_S3_REGION: us-east-1
      TESTIMONY_S3_BUCKET: testimony
      TESTIMONY_S3_ACCESS_KEY_ID: minioadmin
      TESTIMONY_S3_SECRET_ACCESS_KEY: minioadmin
      TESTIMONY_S3_USE_PATH_STYLE: "true"
      TESTIMONY_GENERATE_VARIANT: allure2
      TESTIMONY_GENERATE_CLI_PATH: /usr/local/bin/allure
      TESTIMONY_GENERATE_MAX_CONCURRENCY: "1"
      TESTIMONY_GENERATE_TIMEOUT: 2m
    ports:
      - "18080:8080"
    volumes:
      - testimony-data:/var/lib/testimony
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/readyz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  minio-data:
  testimony-data:

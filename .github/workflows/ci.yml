name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-test-and-docs:
    name: Go tests + docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install verification dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(gofmt -l .)" ]]; then
            echo "gofmt reported unformatted files" >&2
            gofmt -l .
            exit 1
          fi

      - name: Run Go test suite
        shell: bash
        run: go test ./... -p 1

      - name: Verify docs and CI examples
        shell: bash
        run: bash scripts/verify-docs-and-ci.sh

  helm-chart:
    name: Helm chart verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Helm 3
        shell: bash
        run: |
          set -euo pipefail
          HELM_VERSION="v3.17.3"
          curl -fsSLo /tmp/helm.tgz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -C /tmp -xzf /tmp/helm.tgz
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm

      - name: Verify Helm chart
        shell: bash
        run: bash scripts/verify-helm-chart.sh
